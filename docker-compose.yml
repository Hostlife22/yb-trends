version: "3.9"

services:
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      YBT_GOOGLE_PROVIDER: mock
      YBT_SQLITE_PATH: /data/trends.db
      YBT_ENABLE_INPROCESS_SCHEDULER: "false"
    volumes:
      - trends_data:/data

  sync:
    build: ./apps/api
    command: ["python", "-m", "scripts.run_sync", "--region", "US", "--period", "7d"]
    environment:
      YBT_GOOGLE_PROVIDER: mock
      YBT_SQLITE_PATH: /data/trends.db
    volumes:
      - trends_data:/data
    profiles: ["manual-sync"]

  dashboard:
    build: ./apps/dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  trends_data:
